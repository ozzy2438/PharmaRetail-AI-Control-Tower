name: "pharma_retail"
version: "1.0.0"
config-version: 2

profile: "pharma_retail"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  pharma_retail:
    staging:
      +schema: STAGING
      +materialized: view
    intermediate:
      +schema: INTERMEDIATE
      +materialized: table
    marts:
      +schema: MARTS
      +materialized: table
