name: "pharma_retail"
version: "1.0.0"
config-version: 2

profile: "pharma_retail"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # PR builds validate models without mutating account-level policies. Deploy
  # and scheduled jobs set this true after the bootstrap governance objects
  # have been installed by the human ACCOUNTADMIN path.
  phase4_governance_enabled: "{{ env_var('DBT_PHASE4_GOVERNANCE_ENABLED', 'false') }}"

models:
  pharma_retail:
    staging:
      +schema: STAGING
      +materialized: view
    intermediate:
      +schema: INTERMEDIATE
      +materialized: table
    marts:
      +schema: MARTS
      +materialized: table
