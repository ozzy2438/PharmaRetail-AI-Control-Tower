version: 2

models:
  - name: dim_date
    description: Generated calendar dimension, 2009-01-01 through 2030-12-31.
    columns:
      - name: date_day
        tests: [not_null, unique]
      - name: date_key
        tests: [not_null, unique]
      - name: is_weekend
        tests: [not_null]

  - name: dim_store
    description: >
      Store dimension from the synthetic Australian seed (contracts/dim_store.yml).
      Not joined to the UCI-based sales facts in this phase.
    columns:
      - name: store_id
        tests: [not_null, unique]
      - name: state
        tests:
          - accepted_values:
              values: ["ACT", "NSW", "NT", "QLD", "SA", "TAS", "VIC", "WA"]

  - name: dim_product
    description: >
      Product dimension from the synthetic catalog (contracts/dim_product.yml).
      Not joined to the UCI-based sales facts in this phase.
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: category
        tests:
          - accepted_values:
              values:
                [
                  "vitamins",
                  "skincare",
                  "oral care",
                  "baby care",
                  "pain relief",
                  "cold & flu",
                  "personal care",
                ]

  - name: fct_sales_daily
    description: Daily UCI sales fact at (date_day, country) grain.
    columns:
      - name: date_day
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: country
        tests: [not_null]
      - name: total_revenue
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: fct_returns
    description: Daily UCI returns fact at (date_day, country) grain.
    columns:
      - name: date_day
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: country
        tests: [not_null]

  - name: mart_sales_daily
    description: >
      Governed sales mart at store_id, product_id and date grain, preserving
      gross and net sales separately.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [store_id, product_id, date]
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: units_sold
        tests: [not_null]
      - name: gross_sales
        tests: [not_null]
      - name: net_sales
        tests: [not_null]
      - name: return_rate
        tests: [not_null]
      - name: average_unit_price
        tests: [not_null]

  - name: mart_store_daily
    description: >
      Daily store summary where total_sales is gross sales and total_returns is
      the positive return value.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [store_id, date]
    columns:
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: total_sales
        tests: [not_null]
      - name: total_returns
        tests: [not_null]
      - name: transaction_count
        tests: [not_null]
      - name: active_products
        tests: [not_null]

  - name: mart_product_daily
    description: >
      Daily product summary with quantity-weighted return rate and active-store
      count.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [product_id, date]
    columns:
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: total_units
        tests: [not_null]
      - name: total_sales
        tests: [not_null]
      - name: return_rate
        tests: [not_null]
      - name: active_store_count
        tests: [not_null]

  - name: dim_supplier
    description: Deterministic synthetic supplier dimension for Phase 4 operations.
    config:
      tags: [phase4]
    columns:
      - name: supplier_id
        tests: [not_null, unique]
      - name: contact_email
        tests: [not_null]

  - name: fct_inventory_snapshot
    description: Daily store-product inventory ledger with exact equation reconciliation.
    config:
      tags: [phase4]
    columns:
      - name: inventory_snapshot_id
        tests: [not_null, unique]
      - name: snapshot_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: supplier_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_supplier')
              field: supplier_id
      - name: closing_stock
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: on_order_qty
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: days_of_cover
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: ground_truth_root_cause
        tests: [not_null]

  - name: fct_supplier_delivery
    description: Supplier orders and actual deliveries with binary OTIF outcome.
    config:
      tags: [phase4]
    columns:
      - name: delivery_id
        tests: [not_null, unique]
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: supplier_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_supplier')
              field: supplier_id
      - name: otif
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: fct_stockout_event
    description: Consecutive zero-closing-stock event islands where demand remained positive.
    config:
      tags: [phase4]
    columns:
      - name: stockout_event_id
        tests: [not_null, unique]
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: estimated_lost_sales
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: severity
        tests:
          - not_null
          - accepted_values:
              values: [MEDIUM, HIGH, CRITICAL]
      - name: ground_truth_root_cause
        tests: [not_null]
      - name: likely_root_cause
        tests:
          - not_null
          - accepted_values:
              values: [SUPPLIER_DELAY, PROMO_UPLIFT, DEMAND_SPIKE, REPLENISHMENT_GAP]

  - name: fct_promotion
    description: Store-product promotion windows with expected and actual uplift.
    config:
      tags: [phase4]
    columns:
      - name: promotion_id
        tests: [not_null, unique]
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id

  - name: fct_incident
    description: Operational incidents spanning all seven deterministic root-cause scenarios.
    config:
      tags: [phase4]
    columns:
      - name: incident_id
        tests: [not_null, unique]
      - name: incident_type
        tests: [not_null]
      - name: store_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: severity
        tests:
          - accepted_values:
              values: [MEDIUM, HIGH, CRITICAL]
