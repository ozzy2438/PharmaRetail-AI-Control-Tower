version: 2

sources:
  - name: raw
    database: "{{ env_var('SNOWFLAKE_DATABASE', 'PHARMARETAIL_AI_CONTROL_TOWER') }}"
    schema: RAW
    description: >
      Landing zone loaded by scripts/load_raw_data.py per contracts/*.yml
      (see docs/data_ingestion.md). Truncate-and-reload per run; _loaded_at
      marks the most recent load.
    loaded_at_field: _loaded_at
    freshness:
      warn_after: { count: 7, period: day }
      error_after: { count: 30, period: day }
    tables:
      - name: uci_sales
        identifier: UCI_SALES
        description: >
          Deduplicated, valid-price, non-return UCI Online Retail invoice
          lines. See contracts/uci_sales.yml.
        columns:
          - name: invoice
            tests: [not_null]
          - name: stock_code
            tests: [not_null]
          - name: quantity
            tests: [not_null]
          - name: invoice_date
            tests: [not_null]
          - name: price
            tests: [not_null]
          - name: country
            tests: [not_null]

      - name: uci_returns
        identifier: UCI_RETURNS
        description: >
          Deduplicated, valid-price UCI Online Retail invoice lines
          classified as returns/cancellations. See contracts/uci_returns.yml.
        columns:
          - name: invoice
            tests: [not_null]
          - name: stock_code
            tests: [not_null]
          - name: invoice_date
            tests: [not_null]
          - name: price
            tests: [not_null]
          - name: country
            tests: [not_null]

      - name: uci_sales_quarantine
        identifier: UCI_SALES_QUARANTINE
        description: >
          Non-positive-price rows quarantined before return/sales
          classification. A governed exception queue, not a fact table; it
          is never blended into stg_uci_sales or stg_uci_returns. See
          contracts/uci_invalid_price.yml.
        columns:
          - name: invoice
            tests: [not_null]
          - name: quarantine_reason
            tests:
              - not_null
              - accepted_values:
                  values: ["non_positive_price"]

      - name: dim_store_seed
        identifier: DIM_STORE_SEED
        description: >
          Synthetic-development seed of 100 Australian Chemist Warehouse
          stores derived from OSM records. See contracts/dim_store.yml. Not
          currently joinable to the UCI sales facts (see
          dbt/pharma_retail/README.md).
        columns:
          - name: store_id
            tests: [not_null, unique]
          - name: state
            tests:
              - accepted_values:
                  values: ["ACT", "NSW", "NT", "QLD", "SA", "TAS", "VIC", "WA"]

      - name: dim_product_seed
        identifier: DIM_PRODUCT_SEED
        description: >
          Fully synthetic 300-row pharmacy-retail product catalog. See
          contracts/dim_product.yml. Uses its own product_id space
          (PRD0001-PRD0300), unrelated to UCI stock_code values.
        columns:
          - name: product_id
            tests: [not_null, unique]
          - name: category
            tests:
              - accepted_values:
                  values:
                    [
                      "vitamins",
                      "skincare",
                      "oral care",
                      "baby care",
                      "pain relief",
                      "cold & flu",
                      "personal care",
                    ]

      - name: load_audit
        identifier: LOAD_AUDIT
        description: Load audit trail written by scripts/load_raw_data.py; one row per dataset per run.
        loaded_at_field: completed_at
        columns:
          - name: load_id
            tests: [not_null]
          - name: table_name
            tests: [not_null]
          - name: load_status
            tests: [not_null]
