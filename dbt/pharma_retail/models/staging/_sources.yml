version: 2

sources:
  - name: raw
    database: "{{ env_var('SNOWFLAKE_DATABASE', 'PHARMARETAIL') }}"
    schema: RAW
    description: >
      Governed, source-aligned Snowflake landing tables. Staging models are
      typed one-to-one views and never modify these RAW objects.
    loaded_at_field: _loaded_at
    tables:
      - name: store_seed
        identifier: STORE_SEED
        description: Australian pharmacy store seed with nullable postcodes.
        columns:
          - name: store_id
            tests: [not_null, unique]
          - name: postcode_available_flag
            tests:
              - not_null
              - accepted_values:
                  values: [true, false]
                  quote: false

      - name: product_seed
        identifier: PRODUCT_SEED
        description: Synthetic pharmacy product catalog.
        columns:
          - name: product_id
            tests: [not_null, unique]
          - name: cold_chain_flag
            tests:
              - not_null
              - accepted_values:
                  values: [0, 1]
                  quote: false
          - name: regulated_product_flag
            tests:
              - not_null
              - accepted_values:
                  values: [0, 1]
                  quote: false

      - name: uci_sales
        identifier: UCI_SALES
        description: Valid-price, non-return UCI invoice lines.
        columns:
          - name: invoice
            tests: [not_null]
          - name: stock_code
            tests: [not_null]
          - name: quantity
            tests: [not_null]
          - name: invoice_date
            tests: [not_null]
          - name: price
            tests: [not_null]

      - name: uci_returns
        identifier: UCI_RETURNS
        description: Valid-price UCI return and cancellation invoice lines.
        columns:
          - name: invoice
            tests: [not_null]
          - name: stock_code
            tests: [not_null]
          - name: quantity
            tests: [not_null]
          - name: invoice_date
            tests: [not_null]
          - name: price
            tests: [not_null]

      - name: uci_invalid_price
        identifier: UCI_INVALID_PRICE
        description: UCI rows quarantined because their price is non-positive.
        columns:
          - name: invoice
            tests: [not_null]
          - name: stock_code
            tests: [not_null]
          - name: quantity
            tests: [not_null]
          - name: invoice_date
            tests: [not_null]
          - name: price
            tests: [not_null]
          - name: quarantine_reason
            tests:
              - not_null
              - accepted_values:
                  values: ["non_positive_price"]
