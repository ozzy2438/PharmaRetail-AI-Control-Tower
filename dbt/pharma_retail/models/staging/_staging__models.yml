version: 2

models:
  - name: stg_uci_sales
    description: Typed, renamed passthrough of RAW.UCI_SALES.
    columns:
      - name: invoice_number
        tests: [not_null]
      - name: stock_code
        tests: [not_null]
      - name: invoice_date
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
      - name: country
        tests: [not_null]

  - name: stg_uci_returns
    description: Typed, renamed passthrough of RAW.UCI_RETURNS.
    columns:
      - name: invoice_number
        tests: [not_null]
      - name: stock_code
        tests: [not_null]
      - name: invoice_date
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "!= 0"
      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

  - name: stg_store
    description: Typed, renamed passthrough of RAW.DIM_STORE_SEED.
    columns:
      - name: store_id
        tests: [not_null, unique]
      - name: state
        tests:
          - accepted_values:
              values: ["ACT", "NSW", "NT", "QLD", "SA", "TAS", "VIC", "WA"]
      - name: latitude
        tests:
          - dbt_utils.accepted_range:
              min_value: -90
              max_value: 90
      - name: longitude
        tests:
          - dbt_utils.accepted_range:
              min_value: -180
              max_value: 180

  - name: stg_product
    description: Typed, renamed passthrough of RAW.DIM_PRODUCT_SEED.
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: category
        tests:
          - accepted_values:
              values:
                [
                  "vitamins",
                  "skincare",
                  "oral care",
                  "baby care",
                  "pain relief",
                  "cold & flu",
                  "personal care",
                ]

  - name: stg_load_audit
    description: Typed, renamed passthrough of RAW.LOAD_AUDIT.
    columns:
      - name: load_id
        tests: [not_null]
      - name: load_status
        tests:
          - accepted_values:
              values: ["SUCCESS", "ROW_COUNT_MISMATCH", "FAILED"]
