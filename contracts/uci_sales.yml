version: 1
dataset: uci_sales_clean
path: data/processed/uci_sales_clean.parquet
format: parquet
grain: One deduplicated, valid-price, non-return UCI Online Retail invoice line.
columns:
  - name: invoice
    type: string
    nullable: false
    tests: [not_null]
  - name: stock_code
    type: string
    nullable: false
    tests: [not_null]
  - name: description
    type: string
    nullable: true
  - name: quantity
    type: integer
    nullable: false
    minimum_exclusive: 0
  - name: invoice_date
    type: timestamp
    nullable: false
    tests: [not_null]
  - name: price
    type: number
    nullable: false
    minimum_exclusive: 0
  - name: customer_id
    type: string
    nullable: true
  - name: country
    type: string
    nullable: false
    tests: [not_null]
  - name: is_customer_identified
    type: boolean
    nullable: false
rules:
  - Exact duplicates are removed before classification.
  - Rows with price less than or equal to zero are quarantined before return classification.
  - Returns have negative quantity or an invoice beginning with C.
  - customer_id may be null; is_customer_identified must be false for those rows.
