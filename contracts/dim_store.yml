version: 1
dataset: dim_store_seed
path: data/processed/dim_store_seed.csv
format: csv
grain: One selected OSM Chemist Warehouse store per store_id.
columns:
  - name: store_id
    type: string
    nullable: false
    tests: [not_null, unique]
  - name: store_name
    type: string
    nullable: false
    tests: [not_null]
  - name: state
    type: string
    nullable: false
    accepted_values: [ACT, NSW, NT, QLD, SA, TAS, VIC, WA]
  - name: postcode
    type: string
    nullable: true
    pattern: '^\d{4}$'
  - name: latitude
    type: number
    nullable: false
    minimum: -90
    maximum: 90
  - name: longitude
    type: number
    nullable: false
    minimum: -180
    maximum: 180
  - name: region
    type: string
    nullable: false
    accepted_values: [NSW & ACT, VIC & TAS, QLD, SA & NT, WA]
notes:
  - postcode is nullable in practice: only 70 of the 421 downloaded OSM records contain addr:postcode, and all 70 are already included in this seed.
  - The remaining 30 postcodes are left blank rather than fabricated or populated by duplicating an OSM store (see docs/data_readiness.md).
