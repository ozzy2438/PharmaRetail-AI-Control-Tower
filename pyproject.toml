[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "S"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]
"scripts/validate_snowflake_foundation.py" = ["S608"]
"scripts/load_raw_data.py" = ["S608"]
"scripts/validate_phase4_determinism.py" = ["S608"]
"scripts/validate_phase4_governance.py" = ["S608"]
"scripts/load_sop_corpus.py" = ["S608"]
"scripts/validate_phase5_rag.py" = ["S608"]
"scripts/run_stockout_investigation_live.py" = ["S608"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.sqlfluff.core]
dialect = "snowflake"
templater = "raw"
max_line_length = 120

[tool.sqlfluff.indentation]
indented_joins = false
indented_using_on = true
