[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "S"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]
"scripts/validate_snowflake_foundation.py" = ["S608"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.sqlfluff.core]
dialect = "snowflake"
templater = "raw"
max_line_length = 120

[tool.sqlfluff.indentation]
indented_joins = false
indented_using_on = true
