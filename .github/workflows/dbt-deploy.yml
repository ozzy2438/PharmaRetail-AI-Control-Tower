name: dbt Deploy

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment to deploy
        required: true
        type: choice
        options: [development, staging, production]

permissions:
  contents: read

concurrency:
  group: dbt-deploy-${{ github.event_name == 'push' && 'development' || inputs.target_environment }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
    steps:
      - id: resolve
        # A reusable workflow's typed `with:` input is validated before the
        # ternary below could short-circuit, so referencing inputs.* directly
        # there fails on push (workflow_dispatch's `inputs` context doesn't
        # exist for that trigger) even though the same conditional pattern
        # works fine in a plain job attribute like environment: or
        # concurrency.group. Resolving it in an ordinary run: step first
        # (where ${{ }} substitution is permissive) avoids that.
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "target_environment=development" >> "$GITHUB_OUTPUT"
          else
            echo "target_environment=${{ inputs.target_environment }}" >> "$GITHUB_OUTPUT"
          fi

  dbt:
    name: Deployment job
    needs: resolve
    uses: ./.github/workflows/dbt-run.yml
    with:
      target_environment: ${{ needs.resolve.outputs.target_environment }}
      query_tag: PHARMARETAIL_DBT_DEPLOY
      run_label: deploy
    secrets: inherit
