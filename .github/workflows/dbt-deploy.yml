name: dbt Deploy

on:
  push:
    branches: [main]
    paths:
      - "dbt/**"
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub Environment to deploy
        required: true
        type: choice
        options: [development, staging, production]

permissions:
  contents: read

concurrency:
  group: dbt-deploy-${{ github.event.inputs.target_environment || 'development' }}
  cancel-in-progress: false

jobs:
  # Two mutually-exclusive jobs, gated by if:, each with a static with:
  # value — rather than one job computing target_environment via a
  # github.event_name/inputs ternary. A reusable workflow's typed with:
  # inputs are validated before such a ternary could short-circuit, so
  # referencing inputs.* in it fails on push (workflow_dispatch's inputs
  # context doesn't exist for that trigger). Splitting by job-level if:
  # (the same pattern snowflake-deploy.yml already uses for its bau/
  # bootstrap steps) means inputs.target_environment is only ever
  # referenced inside a job whose if: guarantees workflow_dispatch.
  dbt-on-push:
    name: Deployment job (push)
    if: github.event_name == 'push'
    uses: ./.github/workflows/dbt-run.yml
    with:
      target_environment: development
      query_tag: PHARMARETAIL_DBT_DEPLOY
      run_label: deploy
    secrets: inherit

  dbt-on-dispatch:
    name: Deployment job (dispatch)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/dbt-run.yml
    with:
      target_environment: ${{ inputs.target_environment }}
      query_tag: PHARMARETAIL_DBT_DEPLOY
      run_label: deploy
    secrets: inherit
