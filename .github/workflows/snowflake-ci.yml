name: Snowflake CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: snowflake-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Changed-file control
    runs-on: ubuntu-latest
    outputs:
      sql: ${{ steps.filter.outputs.sql }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed-files.txt
          if grep -Eq '^infra/snowflake/.*\.sql$' /tmp/changed-files.txt; then
            echo "sql=true" >> "$GITHUB_OUTPUT"
          else
            echo "sql=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -Eq '^(scripts/|tests/|pyproject\.toml|requirements-dev\.txt)' /tmp/changed-files.txt; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed files:" && sed -n '1,120p' /tmp/changed-files.txt

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-quality:
    name: Python lint and unit tests
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check scripts tests
      - run: python -m pytest
      - name: Validate connection configuration shape
        env:
          SNOWFLAKE_ACCOUNT: ORG-ACCOUNT
          SNOWFLAKE_USER: CI_USER
          SNOWFLAKE_PASSWORD: not-a-real-secret
          SNOWFLAKE_ROLE: ACCOUNTADMIN
          SNOWFLAKE_WAREHOUSE: WH_PHARMARETAIL
          SNOWFLAKE_DATABASE: PHARMARETAIL_AI_CONTROL_TOWER
        run: python -m scripts.validate_snowflake_config --no-connect

  sql-quality:
    name: Snowflake SQL lint and syntax
    needs: changes
    if: needs.changes.outputs.sql == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install sqlfluff
      - run: sqlfluff lint infra/snowflake --dialect snowflake
      - run: sqlfluff parse infra/snowflake --dialect snowflake

  ci-gate:
    name: CI gate
    if: always()
    needs: [changes, secret-scan, python-quality, sql-quality]
    runs-on: ubuntu-latest
    steps:
      - env:
          CHANGES: ${{ needs.changes.result }}
          SECRETS: ${{ needs.secret-scan.result }}
          PYTHON: ${{ needs.python-quality.result }}
          SQL: ${{ needs.sql-quality.result }}
        run: |
          test "$CHANGES" = "success"
          test "$SECRETS" = "success"
          test "$PYTHON" = "success" || test "$PYTHON" = "skipped"
          test "$SQL" = "success" || test "$SQL" = "skipped"
